# Site settings
title: blank
first_name: Benjamin
middle_name:
last_name: Ory
email: benjaminory@gmail.com
description: Benjamin Ory's personal website
keywords: Renaissance music, musicology, early music, digital humanities
lang: en
icon: favicon.png

url: https://benjaminory.com
baseurl:

# Social links used by the modern footer and metadata.
github_username: benory
linkedin_username: benjamin-ory
orcid_id: 0009-0000-0038-0232

# Optional verification / metadata flags consumed by _includes/metadata.liquid.
serve_og_meta: false
serve_schema_org: false
og_image:
enable_google_verification: false
enable_bing_verification: false
google_site_verification:
bing_site_verification:

# Analytics are disabled unless these are set later.
enable_google_analytics: false
enable_cronitor_analytics: false
google_analytics:
cronitor_analytics:

# News is used as a data collection for the homepage, but no old news pages are generated.
collections:
  news:
    output: false

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM

include:
  - _pages

exclude:
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - Makefile
  - README.md
  - _pages/Carapetyan/scripts-listeners.html
  - _pages/Carapetyan/scripts-local.html
  - _pages/Carapetyan/styles-local.html
  - _pages/archive/scripts-listeners.html
  - _pages/archive/scripts-local.html
  - _pages/archive/styles-local.html
  - vendor

keep_files:
  - CNAME
  - .nojekyll

plugins:
  - jekyll-minifier
  - jekyll-sitemap

defaults:
  - scope:
      path: "assets"
    values:
      sitemap: false

jekyll-minifier:
  exclude:
    - robots.txt
  uglifier_args:
    harmony: true
